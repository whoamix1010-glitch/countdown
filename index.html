<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Service Unavailable - Sohan Dhamala</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #ffffff;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
    }
    .container {
      text-align: center;
      background: rgba(0, 0, 0, 0.4);
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }
    p {
      font-size: 1.2em;
      margin-bottom: 20px;
    }
    #countdown {
      font-size: 2em;
      font-weight: bold;
      color: #ffcc00;
    }
    .footer {
      margin-top: 20px;
      font-size: 0.9em;
      color: #ddd;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚧 Service Unavailable 🚧</h1>
    <p>Hello, I’m <strong>Sohan Dhamala</strong>.</p>
    <p>We’ll be back soon. Please check again later.</p>
    <p>Countdown: <span id="countdown">10</span> seconds</p>
    <div class="footer">© 2026 Sohan Dhamala</div>
  </div>

  <script>
    let timeLeft = 10; // seconds
    const countdownEl = document.getElementById("countdown");

    const timer = setInterval(() => {
      timeLeft--;
      countdownEl.textContent = timeLeft;
      if (timeLeft <= 0) {
        clearInterval(timer);
        countdownEl.textContent = "Refreshing...";
        // Optional auto-refresh
        setTimeout(() => location.reload(), 2000);
      }
    }, 1000);
  </script>
</body>
</html>
